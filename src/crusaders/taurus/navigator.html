<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Navigator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 2px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        header h1 { font-size: 1.4rem; color: #e94560; }

        .btn {
            background: #0f3460;
            color: #eee;
            border: 1px solid #e94560;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn:hover { background: #e94560; color: #fff; }

        .banner {
            padding: 0.6rem 1rem;
            background: #0f3460;
            color: #eee;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }
        .banner.success { background: #1e5128; }
        .banner.warning { background: #7a4e1a; }
        .banner button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .banner .close-banner {
            margin-left: auto;
            background: transparent;
            color: #ccc;
            padding: 0 0.4rem;
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 320px;
            background: #16213e;
            border-right: 2px solid #0f3460;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .sidebar-header input {
            flex: 1;
            min-width: 120px;
            padding: 0.5rem;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #eee;
            font-size: 0.85rem;
        }
        .sidebar-header input:focus { outline: none; border-color: #e94560; }

        .file-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
        .file-list::-webkit-scrollbar { width: 8px; }
        .file-list::-webkit-scrollbar-track { background: #1a1a2e; }
        .file-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }

        .file-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.25rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .file-item:hover { background: #1a1a2e; border-color: #0f3460; }
        .file-item.active { background: #0f3460; border-color: #e94560; }

        .file-item .file-name {
            font-size: 0.85rem;
            color: #ccc;
            word-break: break-all;
            margin-bottom: 0.3rem;
        }
        .file-item .file-meta {
            font-size: 0.75rem;
            color: #888;
            display: flex;
            gap: 0.75rem;
        }
        .file-item .file-meta span {
            background: #1a1a2e;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
        }
        .file-item.active .file-meta span { background: #16213e; }

        .viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .viewer-toolbar {
            padding: 0.5rem 1rem;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .viewer-toolbar .current-file {
            flex: 1;
            font-size: 0.85rem;
            color: #aaa;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .viewer iframe { flex: 1; border: none; background: #fff; }

        .placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: #555;
        }
        .placeholder svg { width: 80px; height: 80px; opacity: 0.3; }
        .placeholder p { font-size: 1rem; }

        .file-count {
            font-size: 0.75rem;
            color: #888;
            padding: 0.5rem 1rem;
            border-top: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .nav-buttons { display: flex; gap: 0.25rem; }
        .nav-btn {
            background: #0f3460;
            color: #eee;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.15s;
        }
        .nav-btn:hover { background: #e94560; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .sort-select {
            background: #1a1a2e;
            color: #eee;
            border: 1px solid #0f3460;
            padding: 0.4rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .sort-select:focus { outline: none; border-color: #e94560; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 2px solid #0f3460;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📁 File Navigator</h1>
        <button class="btn" id="pickDirBtn" onclick="pickDirectory()">Choose Directory</button>
        <button class="btn" id="pickFilesBtn" onclick="pickFiles()">Choose Files</button>
        <button class="btn" id="forgetBtn" onclick="forgetDirectory()" style="display:none;">Forget Directory</button>
    </header>

    <div id="bannerContainer"></div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <input type="text" id="searchInput" placeholder="Filter files..." oninput="filterFiles()">
                <select class="sort-select" id="sortSelect" onchange="sortFiles()">
                    <option value="name-asc">Name A→Z</option>
                    <option value="name-desc">Name Z→A</option>
                    <option value="date-asc">Date ↑</option>
                    <option value="date-desc">Date ↓</option>
                </select>
            </div>
            <div class="file-list" id="fileList">
                <div class="placeholder">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                    </svg>
                    <p>Choose a directory or files to begin</p>
                </div>
            </div>
            <div class="file-count" id="fileCount">No files loaded</div>
        </div>

        <div class="viewer" id="viewer">
            <div class="viewer-toolbar" id="viewerToolbar" style="display:none;">
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" onclick="navigatePrev()" title="Previous (←)">◀</button>
                    <button class="nav-btn" id="nextBtn" onclick="navigateNext()" title="Next (→)">▶</button>
                </div>
                <span class="current-file" id="currentFileName"></span>
                <button class="btn" onclick="openInNewTab()" title="Open in new tab">↗</button>
            </div>
            <div class="placeholder" id="viewerPlaceholder">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/>
                </svg>
                <p>Select a file to display</p>
            </div>
            <iframe id="viewerFrame" style="display:none;"></iframe>
        </div>
    </div>

    <script>
        /* ============ IndexedDB persistence ============ */
        const DB_NAME = 'fileNavigatorDB';
        const STORE_NAME = 'handles';
        const DIR_HANDLE_KEY = 'lastDirectory';
        const LAST_FILE_KEY = 'lastSelectedFile';

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function dbPut(key, value) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).put(value, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function dbGet(key) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const req = tx.objectStore(STORE_NAME).get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function dbDelete(key) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).delete(key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function verifyPermission(handle, readWrite = false) {
            if (!handle.queryPermission) return true; // older browsers
            const opts = readWrite ? { mode: 'readwrite' } : {};
            if ((await handle.queryPermission(opts)) === 'granted') return true;
            if ((await handle.requestPermission(opts)) === 'granted') return true;
            return false;
        }

        /* ============ Banner helper ============ */
        function showBanner(message, type = 'info', action = null) {
            const container = document.getElementById('bannerContainer');
            container.innerHTML = `
                <div class="banner ${type}">
                    <span>${message}</span>
                    ${action ? `<button onclick="(${action.toString()})()">${action.label || 'Open'}</button>` : ''}
                    <button class="close-banner" onclick="this.parentElement.remove()">✕</button>
                </div>
            `;
        }

        function clearBanner() {
            document.getElementById('bannerContainer').innerHTML = '';
        }

        /* ============ Core state ============ */
        let allFiles = [];
        let filteredFiles = [];
        let currentIndex = -1;
        let dirHandle = null;

        /* ============ Load files from a directory handle ============ */
        async function loadFromDirectoryHandle(handle, { silent = false } = {}) {
            try {
                const files = [];
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file' && entry.name.toLowerCase().endsWith('.html')) {
                        const file = await entry.getFile();
                        files.push({
                            name: entry.name,
                            handle: entry,
                            file: file,
                            url: URL.createObjectURL(file),
                            ...parseFileName(entry.name)
                        });
                    }
                }

                if (files.length === 0) {
                    if (!silent) alert('No HTML files found in the selected directory.');
                    return false;
                }

                // Clean up previous blob URLs
                allFiles.forEach(f => f.url && URL.revokeObjectURL(f.url));

                allFiles = files;
                dirHandle = handle;
                document.getElementById('forgetBtn').style.display = 'inline-block';

                sortFiles();
                document.getElementById('fileCount').textContent = `${allFiles.length} file(s) found`;

                // Restore last selected file if it still exists
                const lastFileName = await dbGet(LAST_FILE_KEY);
                if (lastFileName) {
                    const idx = filteredFiles.findIndex(f => f.name === lastFileName);
                    if (idx >= 0) selectFile(idx);
                }

                return true;
            } catch (err) {
                console.error('Error loading directory:', err);
                if (!silent) alert('Error reading directory: ' + err.message);
                return false;
            }
        }

        /* ============ Pick directory (user action) ============ */
        async function pickDirectory() {
            if (!window.showDirectoryPicker) {
                alert('Your browser does not support the File System Access API. Please use Chrome or Edge.');
                return;
            }
            try {
                const handle = await window.showDirectoryPicker();
                const ok = await loadFromDirectoryHandle(handle);
                if (ok) {
                    await dbPut(DIR_HANDLE_KEY, handle);
                    showBanner(`✓ Directory "${handle.name}" saved. It will reopen automatically next time.`, 'success');
                    setTimeout(clearBanner, 4000);
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    alert('Error: ' + err.message);
                }
            }
        }

        /* ============ Forget saved directory ============ */
        async function forgetDirectory() {
            if (!confirm('Forget the saved directory? You will need to pick it again next time.')) return;
            await dbDelete(DIR_HANDLE_KEY);
            await dbDelete(LAST_FILE_KEY);
            dirHandle = null;
            document.getElementById('forgetBtn').style.display = 'none';
            showBanner('Saved directory forgotten.', 'warning');
            setTimeout(clearBanner, 3000);
        }

        /* ============ Pick files (fallback, not persisted) ============ */
        function pickFiles() {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = '.html,.htm';
            input.onchange = async (e) => {
                allFiles.forEach(f => f.url && URL.revokeObjectURL(f.url));
                allFiles = [];
                for (const file of e.target.files) {
                    allFiles.push({
                        name: file.name,
                        file: file,
                        url: URL.createObjectURL(file),
                        ...parseFileName(file.name)
                    });
                }
                if (allFiles.length === 0) {
                    alert('No HTML files selected.');
                    return;
                }
                sortFiles();
                document.getElementById('fileCount').textContent = `${allFiles.length} file(s) found`;
                showBanner('ℹ️ Files picked manually — they won\'t be remembered next time. Use "Choose Directory" for persistence.', 'warning');
            };
            input.click();
        }

        /* ============ Filename parsing ============ */
        function parseFileName(name) {
            const baseName = name.replace(/\.(html|htm)$/i, '');
            let date = null, week = null, day = null;

            const isoMatch = baseName.match(/(\d{4})[-_.](\d{2})[-_.](\d{2})/);
            if (isoMatch) {
                date = new Date(isoMatch[1], isoMatch[2] - 1, isoMatch[3]);
            }
            if (!date) {
                const dmyMatch = baseName.match(/(\d{2})[-_.](\d{2})[-_.](\d{4})/);
                if (dmyMatch) date = new Date(dmyMatch[3], dmyMatch[2] - 1, dmyMatch[1]);
            }

            const weekMatch = baseName.match(/[Ww](?:eek)?[-_]?\s*(\d{1,2})/i);
            if (weekMatch) week = parseInt(weekMatch[1]);

            const dayMatch = baseName.match(/(monday|tuesday|wednesday|thursday|friday|saturday|sunday|mon|tue|wed|thu|fri|sat|sun)/i);
            if (dayMatch) day = dayMatch[1];

            return { baseName, date, week, day, dateStr: date ? date.toISOString().split('T')[0] : null };
        }

        /* ============ Sorting / filtering ============ */
        function sortFiles() {
            const sortValue = document.getElementById('sortSelect').value;
            allFiles.sort((a, b) => {
                switch (sortValue) {
                    case 'name-asc': return a.name.localeCompare(b.name);
                    case 'name-desc': return b.name.localeCompare(a.name);
                    case 'date-asc':
                        if (!a.date && !b.date) return a.name.localeCompare(b.name);
                        if (!a.date) return 1;
                        if (!b.date) return -1;
                        return a.date - b.date;
                    case 'date-desc':
                        if (!a.date && !b.date) return b.name.localeCompare(a.name);
                        if (!a.date) return 1;
                        if (!b.date) return -1;
                        return b.date - a.date;
                    default: return 0;
                }
            });
            filterFiles();
        }

        function filterFiles() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            filteredFiles = query
                ? allFiles.filter(f =>
                    f.name.toLowerCase().includes(query) ||
                    (f.dateStr && f.dateStr.includes(query)) ||
                    (f.day && f.day.toLowerCase().includes(query)) ||
                    (f.week !== null && f.week.toString().includes(query)))
                : [...allFiles];
            renderFileList();
        }

        function renderFileList() {
            const list = document.getElementById('fileList');
            if (filteredFiles.length === 0) {
                list.innerHTML = `<div class="placeholder"><p>No files match your filter</p></div>`;
                return;
            }
            list.innerHTML = filteredFiles.map((file, index) => `
                <div class="file-item ${index === currentIndex ? 'active' : ''}"
                     onclick="selectFile(${index})" data-index="${index}">
                    <div class="file-name">${escapeHtml(file.name)}</div>
                    <div class="file-meta">
                        ${file.dateStr ? `<span>📅 ${file.dateStr}</span>` : ''}
                        ${file.week !== null ? `<span>W${file.week}</span>` : ''}
                        ${file.day ? `<span>${capitalize(file.day)}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        /* ============ Selection / navigation ============ */
        function selectFile(index) {
            currentIndex = index;
            const file = filteredFiles[index];

            document.getElementById('viewerPlaceholder').style.display = 'none';
            document.getElementById('viewerFrame').style.display = 'block';
            document.getElementById('viewerToolbar').style.display = 'flex';
            document.getElementById('viewerFrame').src = file.url;
            document.getElementById('currentFileName').textContent = file.name;

            // Remember last selected file
            dbPut(LAST_FILE_KEY, file.name).catch(() => {});

            updateNavButtons();
            renderFileList();

            const activeItem = document.querySelector('.file-item.active');
            if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function navigatePrev() { if (currentIndex > 0) selectFile(currentIndex - 1); }
        function navigateNext() { if (currentIndex < filteredFiles.length - 1) selectFile(currentIndex + 1); }
        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentIndex <= 0;
            document.getElementById('nextBtn').disabled = currentIndex >= filteredFiles.length - 1;
        }
        function openInNewTab() {
            if (currentIndex >= 0) window.open(filteredFiles[currentIndex].url, '_blank');
        }

        /* ============ Helpers ============ */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        }

        /* ============ Keyboard nav ============ */
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); navigatePrev(); }
            else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); navigateNext(); }
        });

        /* ============ Auto-restore on load ============ */
        window.addEventListener('DOMContentLoaded', async () => {
            if (!window.showDirectoryPicker) {
                // API not supported — skip auto-restore silently
                return;
            }
            try {
                const handle = await dbGet(DIR_HANDLE_KEY);
                if (!handle) return;

                // Try silent verify first
                const alreadyGranted = handle.queryPermission
                    ? (await handle.queryPermission({})) === 'granted'
                    : true;

                if (alreadyGranted) {
                    const ok = await loadFromDirectoryHandle(handle, { silent: true });
                    if (ok) {
                        showBanner(`✓ Restored directory "${handle.name}"`, 'success');
                        setTimeout(clearBanner, 3000);
                    }
                } else {
                    // Permission expired — offer one-click reopen
                    showBanner(
                        `📂 Last directory: "${handle.name}" — permission expired.`,
                        'warning',
                        async function reopen() {
                            const granted = await verifyPermission(handle);
                            if (granted) {
                                const ok = await loadFromDirectoryHandle(handle, { silent: true });
                                if (ok) {
                                    showBanner(`✓ Restored directory "${handle.name}"`, 'success');
                                    setTimeout(clearBanner, 3000);
                                }
                            } else {
                                showBanner('Permission denied. Pick a directory manually.', 'warning');
                            }
                        }
                    );
                    // Attach label after rendering
                    const btn = document.querySelector('#bannerContainer button:not(.close-banner)');
                    if (btn) btn.textContent = 'Reopen';
                }
            } catch (err) {
                console.warn('Could not restore last directory:', err);
            }
        });
    </script>
</body>
</html>
